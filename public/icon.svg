<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Avocado outer skin (dark green) -->
  <ellipse cx="50" cy="54" rx="34" ry="40" fill="#2d5a27"/>
  <!-- Avocado top bump/stem area -->
  <ellipse cx="50" cy="20" rx="13" ry="11" fill="#2d5a27"/>
  <!-- Stem -->
  <rect x="47" y="10" width="6" height="10" rx="3" fill="#4a2c0a"/>
  <!-- Avocado flesh (light green) -->
  <ellipse cx="50" cy="57" rx="26" ry="31" fill="#a8d878"/>
  <!-- Avocado pit (brown oval) -->
  <ellipse cx="50" cy="61" rx="12" ry="14" fill="#8b5e3c"/>
  <!-- Pit highlight -->
  <ellipse cx="46" cy="57" rx="4" ry="5" fill="#b8845a" opacity="0.55"/>
</svg>
