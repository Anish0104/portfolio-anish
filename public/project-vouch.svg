  <text x="195" y="441" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="800" fill="#7c3aed">24</text>
  <text x="195" y="456" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#6b21a8" letter-spacing="1.5">APPROVED</text>
  <line x1="240" y1="430" x2="240" y2="458" stroke="#e9d5ff" stroke-width="1"/>
  <text x="305" y="441" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="800" fill="#f43f5e">3</text>
  <text x="305" y="456" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#be123c" letter-spacing="1.5">DENIED</text>
  <line x1="360" y1="430" x2="360" y2="458" stroke="#e9d5ff" stroke-width="1"/>
  <text x="430" y="441" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="800" fill="#f59e0b">1</text>
  <text x="430" y="456" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#92400e" letter-spacing="1.5">PENDING</text>

  <!-- ── Right panel: Shield + Policy ── -->
  <rect x="556" y="18"  width="226" height="218" rx="26" fill="white" opacity="0.72" filter="url(#s2)"/>

  <!-- Shield glow -->
  <circle cx="669" cy="108" r="56" fill="#f9a8d4" opacity="0.3"/>
  <!-- Shield shape -->
  <path d="M669,64 L634,80 L634,112 Q634,140 669,154 Q704,140 704,112 L704,80 Z" fill="url(#shield)" opacity="0.14"/>
  <path d="M669,68 L637,83 L637,113 Q637,139 669,152 Q701,139 701,113 L701,83 Z" fill="none" stroke="url(#shield)" stroke-width="2.5"/>
  <path d="M653,110 L663,120 L687,94" stroke="#f43f5e" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="669" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#1a0a2e" opacity="0.75">Policy Engine</text>

  <rect x="568" y="186" width="98"  height="28" rx="14" fill="#fce7f3" stroke="#fda4af" stroke-width="1"/>
  <text x="617" y="204" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#f43f5e">86% Pass Rate</text>
  <rect x="674" y="186" width="98"  height="28" rx="14" fill="#fdf4ff" stroke="#d8b4fe" stroke-width="1"/>
  <text x="723" y="204" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#7c3aed">M2M · Auth0</text>

  <!-- Policy card -->
  <rect x="556" y="246" width="226" height="236" rx="26" fill="white" opacity="0.72" filter="url(#s2)"/>
  <text x="578" y="276" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#1a0a2e" opacity="0.8">.vouch.yml</text>

  <rect x="568" y="286" width="202" height="32" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="584" y="307" font-family="monospace,monospace" font-size="10.5" fill="#16a34a">✓  repo:read</text>

  <rect x="568" y="324" width="202" height="32" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="584" y="345" font-family="monospace,monospace" font-size="10.5" fill="#16a34a">✓  issues:comment</text>

  <rect x="568" y="362" width="202" height="32" rx="10" fill="#fff1f2" stroke="#fecdd3" stroke-width="1"/>
  <text x="584" y="383" font-family="monospace,monospace" font-size="10.5" fill="#f43f5e">✗  repo:admin</text>

  <rect x="568" y="400" width="202" height="32" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="584" y="421" font-family="monospace,monospace" font-size="10.5" fill="#d97706">⧗  pr:merge</text>

  <text x="578" y="453" font-family="system-ui,sans-serif" font-size="9" fill="#a855f7" opacity="0.7" letter-spacing="0.5">trust_level: human-in-loop</text>
</svg>
