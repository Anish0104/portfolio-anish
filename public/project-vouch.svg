<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf2f8"/>
      <stop offset="50%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#fdf4ff"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f9a8d4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f9a8d4" stop-opacity="0"/>
    </radialGradient>
    <filter id="s1"><feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#f43f5e" flood-opacity="0.1"/></filter>
    <filter id="s2"><feDropShadow dx="0" dy="2" stdDeviation="6"  flood-color="#000" flood-opacity="0.06"/></filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Soft orbs -->
  <circle cx="680" cy="90"  r="140" fill="url(#glow1)"/>
  <circle cx="120" cy="400" r="100" fill="#fbcfe8" opacity="0.25"/>

  <!-- ── Sidebar ── -->
  <rect x="18" y="18" width="64" height="464" rx="22" fill="white" opacity="0.72" filter="url(#s2)"/>
  <!-- icon: home -->
  <rect x="28" y="44"  width="44" height="44" rx="14" fill="#fce7f3"/>
  <path d="M50,52 L40,60 L40,78 L46,78 L46,70 L54,70 L54,78 L60,78 L60,60 Z" fill="#f43f5e" opacity="0.75"/>
  <!-- icon: shield (active) -->
  <rect x="28" y="98"  width="44" height="44" rx="14" fill="url(#shield)" filter="url(#s1)"/>
  <path d="M50,106 L40,112 L40,124 Q40,136 50,140 Q60,136 60,124 L60,112 Z" fill="white" opacity="0.9"/>
  <path d="M45,124 L49,128 L57,118" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- icon: users -->
  <rect x="28" y="152" width="44" height="44" rx="14" fill="#fce7f3"/>
  <circle cx="50" cy="164" r="6" fill="#f43f5e" opacity="0.65"/>
  <path d="M38,190 Q38,180 50,180 Q62,180 62,190" fill="#f43f5e" opacity="0.65"/>
  <!-- icon: settings -->
  <rect x="28" y="206" width="44" height="44" rx="14" fill="#fce7f3"/>
  <circle cx="50" cy="228" r="8" fill="none" stroke="#f43f5e" stroke-width="2" opacity="0.65"/>
  <circle cx="50" cy="228" r="3" fill="#f43f5e" opacity="0.65"/>

  <!-- ── Main panel ── -->
  <rect x="100" y="18" width="438" height="464" rx="26" fill="white" opacity="0.70" filter="url(#s2)"/>

  <text x="126" y="55"  font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#1a0a2e" opacity="0.85">Authorization Console</text>
  <text x="126" y="71"  font-family="system-ui,sans-serif" font-size="9"  fill="#a855f7" letter-spacing="2">VOUCH · AI AGENT SECURITY</text>

  <!-- Request 1: Authorized -->
  <rect x="116" y="86"  width="406" height="74" rx="16" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <circle cx="142" cy="123" r="12" fill="#22c55e"/>
  <path d="M136,123 L141,128 L150,116" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="162" y="112" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#166534">AUTHORIZED</text>
  <text x="162" y="128" font-family="system-ui,sans-serif" font-size="10" fill="#15803d" opacity="0.8">github-bot → repo:read · issues:comment</text>
  <text x="162" y="146" font-family="system-ui,sans-serif" font-size="9"  fill="#4ade80" opacity="0.9">Auth0 M2M · 2s ago</text>

  <!-- Request 2: Denied -->
  <rect x="116" y="170" width="406" height="74" rx="16" fill="#fff1f2" stroke="#fecdd3" stroke-width="1"/>
  <circle cx="142" cy="207" r="12" fill="#f43f5e"/>
  <path d="M136,202 L148,214 M148,202 L136,214" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <text x="162" y="196" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#9f1239">DENIED — POLICY VIOLATION</text>
  <text x="162" y="212" font-family="system-ui,sans-serif" font-size="10" fill="#be123c" opacity="0.8">scanner-bot → repo:admin (trust exceeded)</text>
  <text x="162" y="230" font-family="system-ui,sans-serif" font-size="9"  fill="#f87171" opacity="0.9">Incident logged · Admin notified</text>

  <!-- Request 3: Pending -->
  <rect x="116" y="254" width="406" height="74" rx="16" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <circle cx="142" cy="291" r="12" fill="#f59e0b"/>
  <text x="139" y="296" font-family="system-ui,sans-serif" font-size="13" font-weight="800" fill="white">?</text>
  <text x="162" y="280" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#92400e">AWAITING HUMAN APPROVAL</text>
  <text x="162" y="296" font-family="system-ui,sans-serif" font-size="10" fill="#b45309" opacity="0.8">linear-agent → pr:merge · human-in-loop</text>
  <text x="162" y="314" font-family="system-ui,sans-serif" font-size="9"  fill="#fbbf24" opacity="0.9">Waiting 4m · Notify: anish@rutgers.edu</text>

  <!-- Request 4: Authorized -->
  <rect x="116" y="338" width="406" height="74" rx="16" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <circle cx="142" cy="375" r="12" fill="#22c55e"/>
  <path d="M136,375 L141,380 L150,368" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="162" y="364" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#166534">AUTHORIZED</text>
  <text x="162" y="380" font-family="system-ui,sans-serif" font-size="10" fill="#15803d" opacity="0.8">docs-agent → repo:read · web-search</text>
  <text x="162" y="398" font-family="system-ui,sans-serif" font-size="9"  fill="#4ade80" opacity="0.9">Auth0 M2M · 18s ago</text>

